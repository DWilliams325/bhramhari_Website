  <div style="background:var(--navy);padding:60px 48px;">
    <span class="chip chip-gold">Internal</span>
    <h1 style="font-family:'Playfair Display',serif;font-size:38px;font-weight:900;color:#fff;margin-top:10px;">Photo <em style="color:var(--gold);">Moderation</em></h1>
  </div>

  <div id="admin-app">
    <section class="section" id="admin-login">
      <div class="admin-login-card">
        <h3 style="font-family:'Playfair Display',serif;font-size:24px;color:var(--navy);margin-bottom:18px;">Admin Log In</h3>
        <div class="cf-fld full" style="margin-bottom:14px;"><label>Email</label><input type="email" id="admin-email" placeholder="you@email.com" /></div>
        <div class="cf-fld full" style="margin-bottom:14px;"><label>Password</label><input type="password" id="admin-password" placeholder="Password" /></div>
        <div class="calc-error" id="admin-login-error" style="display:none;"></div>
        <button class="cf-submit" onclick="adminLogin()">Log In →</button>
      </div>
    </section>

    <section class="section" id="admin-dashboard" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto 24px;">
        <h2 class="section-h" style="font-size:28px;">Pending Photos</h2>
        <button class="btn-ghost" style="color:var(--navy);border-color:var(--navy);background:transparent;" onclick="adminLogout()">Log Out</button>
      </div>
      <div class="admin-pending-grid" id="admin-pending-grid"></div>
      <p id="admin-pending-empty" style="text-align:center;color:var(--gray);margin-top:24px;display:none;">No photos pending review.</p>
    </section>
  </div>

  <script src="gallery-config.js"></script>
